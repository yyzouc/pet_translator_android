name: Build APK with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK in Docker container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ~/.buildozer:/home/user/.buildozer \
            -w /app \
            -e FORCE_ROOT=1 \
            kivy/buildozer:latest \
            sh -c "printf 'y\n' | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pet-translator-apk
          path: bin/*.apk
