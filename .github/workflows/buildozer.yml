name: Build APK (Stable Final)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ⭐ 必须 22.04（24.04 会炸）

    env:
      ANDROIDMINAPI: 21

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Python（固定 3.9）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      # 3️⃣ 缓存（加速）
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # 4️⃣ 系统依赖（关键）
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            git zip unzip \
            zlib1g-dev \
            libncurses5 \
            libffi-dev \
            libssl-dev \
            autoconf automake libtool pkg-config \
            build-essential

      # ⭐ 强制 Java 版本（避免 Gradle 崩）
      - name: Fix Java version
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
          java -version

      # 5️⃣ Python依赖
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.4.0 cython==0.29.36

      # ⭐ 可选：防止缓存导致奇怪错误
      - name: Clean previous build
        run: |
          rm -rf .buildozer

      # 6️⃣ 构建 APK
      - name: Build APK
        run: |
          buildozer android debug

      # 7️⃣ 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
