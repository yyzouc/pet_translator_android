name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      ANDROIDMINAPI: 21

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Upgrade pip & install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython==3.0.2" wheel

    - name: Install required system packages
      run: |
        sudo apt update
        sudo apt install -y openjdk-8-jdk zip unzip zlib1g-dev libncurses5 libncurses5-dev \
        libffi-dev libssl-dev autoconf automake libtool pkg-config

    - name: Build APK
      run: |
        buildozer android debug
