name: Build APK (Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ✅ 关键：不要用 24.04

    env:
      ANDROIDMINAPI: 21

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Python（固定 3.9）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      # 3️⃣ 缓存（加速）
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # 4️⃣ 系统依赖（兼容 Buildozer）
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            git zip unzip \
            zlib1g-dev \
            libncurses5 \
            libffi-dev \
            libssl-dev \
            autoconf automake libtool pkg-config \
            build-essential

      # 5️⃣ Python依赖
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.4.0 cython==0.29.36

      # 6️⃣ 构建 APK
      - name: Build APK
        run: |
          buildozer android debug

      # 7️⃣ 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
