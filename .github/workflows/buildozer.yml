name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-24.04
    env:
      ANDROIDMINAPI: '21'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            git \
            unzip \
            zip \
            zlib1g-dev \
            libncurses6 \
            libstdc++6 \
            libffi-dev \
            libssl-dev \
            wget \
            curl \
            autoconf \
            automake \
            libtool \
            pkg-config \
            python3-dev \
            build-essential

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.4.0 cython==3.0.11

      - name: Build APK
        run: |
          buildozer -v android debug
